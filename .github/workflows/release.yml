name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          BINARY="humify-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "$BINARY" .
          echo "BINARY=$BINARY" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: humify-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY }}

  publish:
    name: Publish release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb # v2
        with:
          files: dist/*
          generate_release_notes: true
